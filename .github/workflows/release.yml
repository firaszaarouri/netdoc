name: Release

# Cuts a tagged multi-platform release via GoReleaser.
#
# Trigger:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Output:
#   - GitHub Release with binaries for Linux/macOS/Windows on amd64+arm64
#   - .deb / .rpm / .apk packages
#   - Docker images at ghcr.io/firaszaarouri/netdoc:<tag>
#   - Homebrew formula updated in firaszaarouri/homebrew-netdoc
#   - Scoop manifest updated in firaszaarouri/scoop-netdoc
#
# Required secrets (configure under repo Settings → Secrets):
#   GORELEASER_GITHUB_TOKEN  — PAT with `repo` scope for cross-repo
#                              tap/bucket publishing. Default GITHUB_TOKEN
#                              only has access to THIS repo, not the
#                              homebrew-* / scoop-* repos.
#   GHCR_USERNAME / GHCR_TOKEN — for pushing Docker images.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for creating releases + uploading assets
  packages: write   # for pushing Docker images to ghcr.io

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 docker builds on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Use GORELEASER_GITHUB_TOKEN when cross-repo publishing
          # (Homebrew tap, Scoop bucket) is needed; fall back to
          # GITHUB_TOKEN for in-repo release publishing only.
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
