# GoReleaser config for netdoc — multi-platform tagged releases.
#
# Trigger flow:
#   git tag v1.0.0
#   git push origin v1.0.0
# → .github/workflows/release.yml fires
# → goreleaser release --clean
# → builds Linux + macOS + Windows on amd64 + arm64
# → produces .tar.gz / .zip archives with checksums
# → uploads to GitHub Releases
# → publishes Homebrew formula update to the configured tap
#
# Local dry-run: goreleaser release --snapshot --clean --skip-publish
#
# Reference: https://goreleaser.com/customization/

version: 2

project_name: netdoc

before:
  hooks:
    - go mod tidy

builds:
  - id: netdoc
    main: .
    binary: netdoc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Strip debug info to shrink the binary further (~14 MB → ~10 MB).
    # -X main.version sets the version at link time so users get the real
    # tag instead of "dev" when running --version.
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: netdoc-archive
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    # Windows users prefer .zip; everyone else gets .tar.gz.
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# nfpm packages — Linux .deb + .rpm + .apk. Apt/yum/dnf-installable.
nfpms:
  - id: netdoc-pkg
    package_name: netdoc
    vendor: netdoc
    homepage: https://github.com/firaszaarouri/netdoc
    maintainer: Firas <noreply@example.com>
    description: |-
      Single-binary network diagnostic CLI. 14 deep checks per host
      (DNS, TLS, HTTP, mail, path, ports, ...) with unprivileged-by-default
      operation. Zero telemetry. Bit-accurate TLS 1.3 0-RTT detection.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: net
    priority: optional
    contents:
      - src: README.md
        dst: /usr/share/doc/netdoc/README.md
      - src: CHANGELOG.md
        dst: /usr/share/doc/netdoc/CHANGELOG.md

# Docker images — minimal scratch base + the static binary.
# Published to ghcr.io/<owner>/netdoc:<tag>.
dockers:
  - image_templates:
      - "ghcr.io/firaszaarouri/netdoc:{{ .Tag }}-amd64"
      - "ghcr.io/firaszaarouri/netdoc:latest-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Single-binary network diagnostic"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/firaszaarouri/netdoc"
      - "--label=org.opencontainers.image.licenses=MIT"
    goarch: amd64
  - image_templates:
      - "ghcr.io/firaszaarouri/netdoc:{{ .Tag }}-arm64"
      - "ghcr.io/firaszaarouri/netdoc:latest-arm64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.description=Single-binary network diagnostic"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/firaszaarouri/netdoc"
      - "--label=org.opencontainers.image.licenses=MIT"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/firaszaarouri/netdoc:{{ .Tag }}"
    image_templates:
      - "ghcr.io/firaszaarouri/netdoc:{{ .Tag }}-amd64"
      - "ghcr.io/firaszaarouri/netdoc:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/firaszaarouri/netdoc:latest"
    image_templates:
      - "ghcr.io/firaszaarouri/netdoc:latest-amd64"
      - "ghcr.io/firaszaarouri/netdoc:latest-arm64"

# Homebrew tap — `brew install firaszaarouri/netdoc/netdoc` after this fires.
# Requires a separate repo `homebrew-netdoc` to host the formula. Goreleaser
# pushes the generated formula there when GORELEASER_GITHUB_TOKEN has access.
brews:
  - name: netdoc
    repository:
      owner: firaszaarouri
      name: homebrew-netdoc
      branch: main
    homepage: "https://github.com/firaszaarouri/netdoc"
    description: "Single-binary network diagnostic — 14 deep checks per host"
    license: MIT
    test: |
      system "#{bin}/netdoc", "--version"
    install: |
      bin.install "netdoc"

# Scoop bucket — `scoop install netdoc` after this fires.
# Same pattern as brew: requires a separate `scoop-netdoc` bucket repo.
scoops:
  - name: netdoc
    repository:
      owner: firaszaarouri
      name: scoop-netdoc
      branch: main
    homepage: "https://github.com/firaszaarouri/netdoc"
    description: "Single-binary network diagnostic — 14 deep checks per host"
    license: MIT

release:
  github:
    owner: firaszaarouri
    name: netdoc
  prerelease: auto
  draft: false
  header: |
    ## netdoc {{ .Tag }}

    Single-binary network diagnostic — 14 deep checks per host.

    See [CHANGELOG.md](https://github.com/firaszaarouri/netdoc/blob/main/CHANGELOG.md) for the
    full feature map and roadmap.
  footer: |
    ---
    **Install:**
    - Homebrew: `brew install firaszaarouri/netdoc/netdoc`
    - Scoop: `scoop bucket add netdoc https://github.com/firaszaarouri/scoop-netdoc && scoop install netdoc`
    - Docker: `docker run --rm ghcr.io/firaszaarouri/netdoc:{{ .Tag }} github.com`
    - Manual: download the archive for your platform below
